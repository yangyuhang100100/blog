<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>博客后台 - Decap CMS</title>
  </head>
  <body>
    <div id="nc-root"></div>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      window.CMS_MANUAL_INIT = true;
      window.CMS_CONFIG = {
        backend: {
          name: "git-gateway",
          branch: "main",
        },
        media_folder: "public/uploads",
        public_folder: "/uploads",
        collections: [
          {
            name: "posts",
            label: "文章",
            folder: "posts",
            create: true,
            slug: "{{slug}}",
            extension: "md",
            format: "frontmatter",
            fields: [
              { label: "标题", name: "title", widget: "string" },
              { label: "发布时间", name: "date", widget: "datetime" },
              { label: "正文", name: "body", widget: "markdown" },
            ],
          },
        ],
      };
      window.CMS && window.CMS.init(window.CMS_CONFIG);
    </script>
  </body>
</html>
